<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marginalium — Markdown Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg:            #f5f2ec;
    --c-surface:       #fffef9;
    --c-border:        rgba(60,50,30,0.12);
    --c-border-strong: rgba(60,50,30,0.22);
    --c-text:          #1a1610;
    --c-muted:         #6b6050;
    --c-accent:        #7a3e1a;
    --c-accent-light:  #f0e8de;
    --c-tag-char:      #4a2a6a;
    --c-tag-char-bg:   #ede8f5;
    --c-tag-place:     #1a3a5a;
    --c-tag-place-bg:  #deeaf5;
    --c-tag-text:      #3a4a1a;
    --c-tag-text-bg:   #e8eedd;
    --c-bq-text:       #5a4a2a;
    --c-bq-bg:         #faf5ec;
    --c-bq-border:     #c8a86a;
    --c-mark-line-bg:  #fdf8f0;
    --c-mark-line-bdr: #e8c88a;
    --font-ui:         'Outfit', sans-serif;
    --font-doc:        'Lora', serif;
    --font-mono:       'JetBrains Mono', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --c-bg:            #1a1810;
      --c-surface:       #211f17;
      --c-border:        rgba(200,180,140,0.12);
      --c-border-strong: rgba(200,180,140,0.22);
      --c-text:          #ede8dc;
      --c-muted:         #9a8e78;
      --c-accent:        #d08050;
      --c-accent-light:  #2a1e14;
      --c-tag-char:      #c0a0e0;
      --c-tag-char-bg:   #2a1e3a;
      --c-tag-place:     #88b8e0;
      --c-tag-place-bg:  #122030;
      --c-tag-text:      #a0c070;
      --c-tag-text-bg:   #182010;
      --c-bq-text:       #c8a86a;
      --c-bq-bg:         #1e1a10;
      --c-bq-border:     #806040;
      --c-mark-line-bg:  #221d10;
      --c-mark-line-bdr: #806040;
    }
  }

  html, body {
    height: 100%;
    font-family: var(--font-ui);
    background: var(--c-bg);
    color: var(--c-text);
    overflow: hidden;
  }

  /* ── Layout ── */
  #app {
    display: grid;
    grid-template-columns: 220px 1fr 270px;
    grid-template-rows: 52px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    grid-column: 1 / -1;
    background: var(--c-surface);
    border-bottom: 0.5px solid var(--c-border-strong);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
  }
  #topbar-logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--c-accent);
    letter-spacing: 0.03em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  #topbar-logo i { font-size: 18px; }
  #open-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--c-accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font-ui);
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  #open-btn:hover { opacity: 0.83; }
  #file-input { display: none; }
  #filename {
    font-size: 12.5px;
    color: var(--c-muted);
    font-family: var(--font-mono);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 280px;
  }
  #bq-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--c-muted);
    cursor: pointer;
    user-select: none;
  }
  #bq-toggle input[type=checkbox] {
    accent-color: var(--c-accent);
    width: 14px; height: 14px;
    cursor: pointer;
  }

  /* ── TOC panel ── */
  #nav-toc {
    background: var(--c-surface);
    border-right: 0.5px solid var(--c-border);
    overflow-y: auto;
    padding: 14px 0 20px;
  }
  #nav-toc h2 {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--c-muted);
    padding: 0 16px 10px;
  }
  .toc-item {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-left: 2px solid transparent;
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--c-text);
    padding: 5px 14px;
    cursor: pointer;
    line-height: 1.4;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  .toc-item:hover  { background: var(--c-accent-light); color: var(--c-accent); border-left-color: var(--c-accent); }
  .toc-item.active { background: var(--c-accent-light); color: var(--c-accent); border-left-color: var(--c-accent); font-weight: 500; }
  .toc-item.h1 { font-weight: 500; padding-left: 16px; }
  .toc-item.h2 { padding-left: 26px; font-size: 12.5px; }
  .toc-item.h3 { padding-left: 36px; font-size: 12px;   color: var(--c-muted); }
  .toc-item.h4 { padding-left: 44px; font-size: 11.5px; color: var(--c-muted); }

  /* ── Document area ── */
  #doc-area {
    overflow-y: auto;
    padding: 44px 52px;
    background: var(--c-bg);
    position: relative;
    transition: outline 0.15s;
  }
  /* drag-over highlight */
  #doc-area.drag-over {
    outline: 3px dashed var(--c-accent);
    outline-offset: -6px;
  }

  #doc-content {
    max-width: 680px;
    margin: 0 auto;
    font-family: var(--font-doc);
    font-size: 17px;
    line-height: 1.82;
    color: var(--c-text);
  }

  #doc-content h1 { font-size: 2em;    font-weight: 500; line-height: 1.2; margin: 1.6em 0 0.5em; }
  #doc-content h2 { font-size: 1.5em;  font-weight: 500; margin: 1.4em 0 0.5em; }
  #doc-content h3 { font-size: 1.2em;  font-weight: 500; margin: 1.2em 0 0.4em; }
  #doc-content h4 { font-size: 1.05em; font-weight: 500; margin: 1em 0 0.4em; color: var(--c-muted); }
  #doc-content h1:first-child,
  #doc-content h2:first-child { margin-top: 0; }
  #doc-content p        { margin: 0.75em 0; }
  #doc-content ul,
  #doc-content ol       { margin: 0.6em 0 0.6em 1.6em; }
  #doc-content li       { margin: 0.25em 0; }
  #doc-content em       { font-style: italic; }
  #doc-content strong   { font-weight: 500; }
  #doc-content hr       { border: none; border-top: 0.5px solid var(--c-border-strong); margin: 2em 0; }
  #doc-content a        { color: var(--c-accent); }
  #doc-content code {
    font-family: var(--font-mono);
    font-size: 0.84em;
    background: var(--c-accent-light);
    color: var(--c-accent);
    padding: 1px 5px;
    border-radius: 4px;
  }
  #doc-content pre {
    background: var(--c-accent-light);
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 1em 0;
  }
  #doc-content pre code { background: none; padding: 0; color: var(--c-text); }

  /* blockquotes (standard >) */
  #doc-content blockquote {
    border-left: 3px solid var(--c-bq-border);
    background: var(--c-bq-bg);
    color: var(--c-bq-text);
    margin: 1.2em 0;
    padding: 12px 20px;
    border-radius: 0 6px 6px 0;
    font-style: italic;
  }
  #doc-content blockquote.bq-hidden { display: none; }

  /* ── Mark line rendered in doc ── */
  /*
    A >> line becomes a <p class="mark-line"> containing pills and plain text.
    The anchor wraps the whole paragraph so clicking a pill in the nav panel
    scrolls to and flashes the whole line.
  */
  p.mark-line {
    background: var(--c-mark-line-bg);
    border-left: 3px solid var(--c-mark-line-bdr);
    border-radius: 0 6px 6px 0;
    padding: 5px 14px;
    margin: 0.6em 0;
    font-family: var(--font-ui);
    font-size: 0.92em;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 5px;
    scroll-margin-top: 80px;
  }
  p.mark-line.flash {
    animation: flash-anim 1.4s ease forwards;
  }
  @keyframes flash-anim {
    0%   { outline: 2px solid var(--c-accent); outline-offset: 2px; }
    75%  { outline: 2px solid var(--c-accent); outline-offset: 2px; }
    100% { outline: 2px solid transparent;    outline-offset: 2px; }
  }

  /* pills inside a mark line */
  .pill {
    font-family: var(--font-mono);
    font-size: 0.82em;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .pill-char  { background: var(--c-tag-char-bg);  color: var(--c-tag-char);  }
  .pill-place { background: var(--c-tag-place-bg); color: var(--c-tag-place); }
  .pill-text  { background: var(--c-tag-text-bg);  color: var(--c-tag-text);  font-style: italic; }

  /* ── Empty / drop state ── */
  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: none;
  }
  #empty-state i         { font-size: 52px; color: var(--c-border-strong); }
  #empty-state .es-title { font-size: 15px; color: var(--c-muted); }
  #empty-state .es-hint  { font-size: 12px; color: var(--c-muted); opacity: 0.6; font-family: var(--font-mono); }

  /* ── Marks panel ── */
  #nav-marks {
    background: var(--c-surface);
    border-left: 0.5px solid var(--c-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #marks-tabs {
    display: flex;
    border-bottom: 0.5px solid var(--c-border);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 11px 4px;
    border: none;
    background: none;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--c-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover  { color: var(--c-text); }
  .tab-btn.active { color: var(--c-accent); border-bottom-color: var(--c-accent); }
  .tab-panel        { display: none; flex: 1; overflow-y: auto; padding: 10px 0 20px; }
  .tab-panel.active { display: block; }

  .panel-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--c-muted);
    padding: 10px 14px 5px;
  }
  .no-marks {
    font-size: 13px;
    color: var(--c-muted);
    font-style: italic;
    padding: 18px 14px;
    line-height: 1.5;
  }

  /* all marks rows */
  .mark-row {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 6px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    flex-wrap: wrap;
  }
  .mark-row:hover { background: var(--c-accent-light); border-left-color: var(--c-accent); }
  .mark-row-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .mark-row-ctx   { font-size: 11.5px; color: var(--c-muted); line-height: 1.4; width: 100%; margin-top: 2px; }

  /* character accordion */
  .char-entry { border-left: 2px solid transparent; transition: border-color 0.1s; }
  .char-entry.open { border-left-color: var(--c-tag-char); }

  .char-header {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .char-header:hover { background: var(--c-tag-char-bg); }

  .char-toggle {
    font-size: 9px;
    color: var(--c-muted);
    flex-shrink: 0;
    transition: transform 0.18s;
    display: inline-block;
    width: 10px;
  }
  .char-entry.open .char-toggle { transform: rotate(90deg); }

  .char-id    { font-family: var(--font-mono); font-size: 12.5px; color: var(--c-tag-char); font-weight: 500; }
  .char-alias { font-size: 11.5px; color: var(--c-muted); font-style: italic; }
  .char-count { font-size: 11px; color: var(--c-muted); margin-left: auto; flex-shrink: 0; }

  .char-occurrences {
    display: none;
    background: var(--c-tag-char-bg);
    padding: 2px 0 6px;
  }
  .char-entry.open .char-occurrences { display: block; }

  .char-occ-row {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 5px 14px 5px 28px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .char-occ-row:hover { background: rgba(74,42,106,0.12); }
  .char-occ-num  { font-family: var(--font-mono); font-size: 10px; color: var(--c-tag-char); opacity: 0.6; flex-shrink: 0; padding-top: 1px; }
  .char-occ-ctx  { font-size: 11.5px; color: var(--c-muted); line-height: 1.4; }

  /* place rows */
  .place-node {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s, border-color 0.1s;
  }
  .place-node:hover          { background: var(--c-tag-place-bg); border-left-color: var(--c-tag-place); }
  .place-node.no-jump        { cursor: default; }
  .place-node.no-jump:hover  { background: none; border-left-color: transparent; }
  .place-chevron { font-size: 10px; color: var(--c-muted); flex-shrink: 0; }
  .place-id      { font-family: var(--font-mono); font-size: 12px; color: var(--c-tag-place); font-weight: 500; }
  .place-count   { font-size: 11px; color: var(--c-muted); margin-left: auto; flex-shrink: 0; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--c-border-strong); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <header id="topbar">
    <div id="topbar-logo">
      <i class="ti ti-book-2" aria-hidden="true"></i>
      Marginalium
    </div>
    <button id="open-btn" onclick="document.getElementById('file-input').click()">
      <i class="ti ti-upload" aria-hidden="true"></i> Open file
    </button>
    <input type="file" id="file-input" accept=".md,.txt">
    <span id="filename"></span>
    <label id="bq-toggle">
      <input type="checkbox" id="bq-check" checked onchange="toggleBlockquotes()">
      show blockquotes
    </label>
  </header>

  <nav id="nav-toc" aria-label="Table of contents">
    <h2>Contents</h2>
    <div id="toc-list"></div>
  </nav>

  <main id="doc-area">
    <div id="empty-state" aria-hidden="true">
      <i class="ti ti-file-text"></i>
      <p class="es-title">Open or drop a markdown file here</p>
      <p class="es-hint">&gt;&gt; @character /place/subplace free text</p>
    </div>
    <div id="doc-content" role="document" aria-label="Document content"></div>
  </main>

  <aside id="nav-marks" aria-label="Marks navigation">
    <div id="marks-tabs" role="tablist">
      <button class="tab-btn active" role="tab" aria-selected="true"  id="tab-all"    onclick="switchTab('all')">All marks</button>
      <button class="tab-btn"        role="tab" aria-selected="false" id="tab-chars"  onclick="switchTab('chars')">Characters</button>
      <button class="tab-btn"        role="tab" aria-selected="false" id="tab-places" onclick="switchTab('places')">Places</button>
    </div>
    <div class="tab-panel active" role="tabpanel" id="panel-all"></div>
    <div class="tab-panel"        role="tabpanel" id="panel-chars"></div>
    <div class="tab-panel"        role="tabpanel" id="panel-places"></div>
  </aside>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
/* ================================================================
   STATE
   ================================================================ */
/*
  markList: array of mark-line objects, one per >> line, in document order.
  Each entry: {
    id:     string  — unique DOM id for the rendered <p class="mark-line">
    rawText: string — full text after >> (trimmed)
    tokens: [{type:'char'|'place'|'text', value:string}]  — parsed tokens
    chars:  [string]  — @identifier values found in this line
    places: [string]  — /path values found in this line
  }

  charIndex:  Map<label, [markId, ...]>  — all mark ids where that @char appears
  placeIndex: Map<label, [markId, ...]>  — all mark ids where that /place appears
*/
let markList   = [];
let charIndex  = new Map();
let placeIndex = new Map();
let showBq     = true;
let scrollListener = null;

/* ================================================================
   FILE LOADING — button + drag-and-drop
   ================================================================ */
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) loadFile(file);
  e.target.value = '';
});

const docArea = document.getElementById('doc-area');

docArea.addEventListener('dragover', function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  docArea.classList.add('drag-over');
});
docArea.addEventListener('dragleave', function(e) {
  // only remove if leaving doc-area entirely, not a child
  if (!docArea.contains(e.relatedTarget)) {
    docArea.classList.remove('drag-over');
  }
});
docArea.addEventListener('drop', function(e) {
  e.preventDefault();
  docArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

function loadFile(file) {
  document.getElementById('filename').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(ev) { processMarkdown(ev.target.result); };
  reader.readAsText(file, 'UTF-8');
}

/* ================================================================
   PARSING
   A mark line is any line whose trimmed content starts with ">>"
   (exactly two > characters, possibly preceded by whitespace).

   After the ">>" there is a space (or nothing), then free content.
   Within that content we scan for:
     @identifier   — a token starting with @ followed by non-whitespace chars
     /path/...     — a token starting with / followed by non-whitespace chars
     anything else — plain text words (grouped between special tokens)
   ================================================================ */

// Token regex: matches @word, /path/sub, or a run of other characters
var TOKEN_RE = /(@[^\s]+|\/[^\s]+|[^@\/\s][^\s]*|\s+)/g;

// Parse a character token like @esposa_do_almeida or @garotinha(Maria José)
// Returns { id: '@esposa_do_almeida', alias: 'Maria José' | null }
function parseCharToken(raw) {
  // raw is the full word starting with @, e.g. "@garotinha(Maria José)"
  // Note: alias may contain spaces only if written without quotes — since we
  // split on whitespace earlier, the alias cannot span multiple words unless
  // the user writes @id(First or @id(First_Last).
  // Supported syntax: @identifier  or  @identifier(alias text)
  var m = raw.match(/^(@[^(]+)(?:\(([^)]*)\))?$/);
  if (m) {
    return { id: m[1], alias: m[2] ? m[2].trim() : null };
  }
  return { id: raw, alias: null };
}

function parseMark(content) {
  // content is the text after ">> " (the mark body)
  // We need to handle aliases that may contain spaces: @id(First Last)
  // Strategy: first collapse alias groups "(…)" so spaces inside them
  // don't break our word-split.
  var tokens  = [];
  var chars   = [];   // [{id, alias}]
  var places  = [];   // [string]
  var textBuf = '';

  // Walk character by character to tokenize, respecting (…) groups
  var words = [];
  var cur = '';
  var depth = 0;
  for (var ci = 0; ci < content.length; ci++) {
    var ch = content[ci];
    if (ch === '(') { depth++; cur += ch; }
    else if (ch === ')') { depth--; cur += ch; }
    else if (/\s/.test(ch) && depth === 0) {
      if (cur) { words.push(cur); cur = ''; }
    } else {
      cur += ch;
    }
  }
  if (cur) words.push(cur);

  words.forEach(function(word) {
    if (word.startsWith('@')) {
      if (textBuf.trim()) { tokens.push({type:'text', value: textBuf.trim()}); }
      textBuf = '';
      var parsed = parseCharToken(word);
      tokens.push({type:'char', value: parsed.id, alias: parsed.alias});
      chars.push(parsed);
    } else if (word.startsWith('/') && word.length > 1) {
      if (textBuf.trim()) { tokens.push({type:'text', value: textBuf.trim()}); }
      textBuf = '';
      tokens.push({type:'place', value: word});
      places.push(word);
    } else {
      textBuf += ' ' + word;
    }
  });
  if (textBuf.trim()) { tokens.push({type:'text', value: textBuf.trim()}); }

  return { tokens: tokens, chars: chars, places: places };
}

/* ================================================================
   MARKDOWN PROCESSING
   ================================================================ */
function processMarkdown(raw) {
  document.getElementById('empty-state').style.display = 'none';
  markList   = [];
  charIndex  = new Map();
  placeIndex = new Map();

  var markId = 0;

  /* -- Pre-process lines --
     Lines that start with >> (possibly after whitespace) are mark lines.
     We convert them to a special HTML paragraph BEFORE handing to marked,
     so marked never sees >> (which would be parsed as nested blockquote).
     We use a placeholder that marked will emit verbatim inside a <p>.
     Actually it's easier to post-process: replace each >> line with a
     unique sentinel string that survives marked's parsing, then swap
     after rendering. But marked wraps bare text lines in <p> ... </p>,
     so we can just preprocess into plain-HTML lines that marked passes through
     when placed alone with blank lines.

     Strategy: replace each >> line with a raw HTML block (blank line before/after)
     that marked emits verbatim. marked supports raw HTML blocks.
  */

  var lines = raw.split('\n');
  var output = [];
  var i = 0;

  while (i < lines.length) {
    var line = lines[i];
    var trimmed = line.trim();

    if (trimmed.startsWith('>>')) {
      // It's a mark line
      var body = trimmed.slice(2).trim();  // text after >>
      var parsed = parseMark(body);
      var id = 'mark-' + (markId++);

      var entry = {
        id:      id,
        rawText: body,
        tokens:  parsed.tokens,
        chars:   parsed.chars,
        places:  parsed.places
      };
      markList.push(entry);

      // register in indexes
      // charIndex: Map<charId, { alias: string|null, occurrences: [{markId, ctx}] }>
      parsed.chars.forEach(function(c) {
        if (!charIndex.has(c.id)) {
          charIndex.set(c.id, { alias: c.alias, occurrences: [] });
        } else if (c.alias && !charIndex.get(c.id).alias) {
          // update alias if we now have one and didn't before
          charIndex.get(c.id).alias = c.alias;
        }
        charIndex.get(c.id).occurrences.push({ markId: id, ctx: body });
      });
      parsed.places.forEach(function(p) {
        if (!placeIndex.has(p)) placeIndex.set(p, []);
        placeIndex.get(p).push(id);
      });

      // Build the pill HTML for inside the mark line paragraph
      var pillsHtml = parsed.tokens.map(function(tok) {
        if (tok.type === 'char') {
          var label = tok.alias ? escHtml(tok.value) + ' <em style="opacity:0.7;font-style:normal">(' + escHtml(tok.alias) + ')</em>' : escHtml(tok.value);
          return '<span class="pill pill-char">' + label + '</span>';
        }
        if (tok.type === 'place') return '<span class="pill pill-place">' + escHtml(tok.value) + '</span>';
        return '<span class="pill pill-text">' + escHtml(tok.value) + '</span>';
      }).join(' ');

      // Emit as a raw HTML block (blank lines required around it for marked)
      output.push('');
      output.push('<p class="mark-line" id="' + id + '">' + pillsHtml + '</p>');
      output.push('');
      i++;
    } else {
      output.push(line);
      i++;
    }
  }

  var processedMd = output.join('\n');

  // Custom renderer: tag blockquotes with bq-hidden if needed
  var renderer = new marked.Renderer();
  var origBq = renderer.blockquote.bind(renderer);
  renderer.blockquote = function(q) {
    var result = origBq(q);
    return result.replace('<blockquote>', '<blockquote' + (showBq ? '' : ' class="bq-hidden"') + '>');
  };

  var html = marked.parse(processedMd, { renderer: renderer, gfm: true, breaks: false });
  var docContent = document.getElementById('doc-content');
  docContent.innerHTML = html;

  buildTOC();
  buildAllPanel();
  buildCharsPanel();
  buildPlacesPanel();
}

/* ================================================================
   TOC
   ================================================================ */
function buildTOC() {
  var docContent = document.getElementById('doc-content');
  var tocList    = document.getElementById('toc-list');
  var headings   = Array.from(docContent.querySelectorAll('h1,h2,h3,h4'));
  tocList.innerHTML = '';

  headings.forEach(function(h, idx) {
    if (!h.id) h.id = 'heading-' + idx;
    h.style.scrollMarginTop = '80px';

    var level = h.tagName.toLowerCase();
    var btn   = document.createElement('button');
    btn.className   = 'toc-item ' + level;
    btn.textContent = h.textContent.trim();
    btn.addEventListener('click', function() {
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.toc-item').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    });
    tocList.appendChild(btn);
  });

  // Remove previous scroll listener to avoid stacking
  var da = document.getElementById('doc-area');
  if (scrollListener) da.removeEventListener('scroll', scrollListener);
  scrollListener = function() { updateActiveTOC(headings); };
  da.addEventListener('scroll', scrollListener, { passive: true });
}

function updateActiveTOC(headings) {
  var scrollTop = document.getElementById('doc-area').scrollTop + 90;
  var activeIdx = 0;
  headings.forEach(function(h, i) { if (h.offsetTop <= scrollTop) activeIdx = i; });
  document.querySelectorAll('.toc-item').forEach(function(b, i) {
    b.classList.toggle('active', i === activeIdx);
  });
}

/* ================================================================
   BLOCKQUOTES
   ================================================================ */
function toggleBlockquotes() {
  showBq = document.getElementById('bq-check').checked;
  document.querySelectorAll('#doc-content blockquote').forEach(function(bq) {
    bq.classList.toggle('bq-hidden', !showBq);
  });
}

/* ================================================================
   TAB SWITCHING
   ================================================================ */
function switchTab(name) {
  ['all','chars','places'].forEach(function(t) {
    document.getElementById('tab-'   + t).classList.toggle('active', t === name);
    document.getElementById('tab-'   + t).setAttribute('aria-selected', t === name ? 'true' : 'false');
    document.getElementById('panel-' + t).classList.toggle('active', t === name);
  });
}

/* ================================================================
   ALL MARKS PANEL
   Each row shows the pills of a mark line and its raw text as context.
   Clicking jumps to that mark line in the document.
   ================================================================ */
function buildAllPanel() {
  var panel = document.getElementById('panel-all');
  if (!markList.length) {
    panel.innerHTML = '<p class="no-marks">No &gt;&gt; marks found in this document.</p>';
    return;
  }
  panel.innerHTML = markList.map(function(m) {
    var pillsHtml = m.tokens.map(function(tok) {
      if (tok.type === 'char') {
        var label = tok.alias ? escHtml(tok.value) + ' <em style="opacity:0.7;font-style:normal">(' + escHtml(tok.alias) + ')</em>' : escHtml(tok.value);
        return '<span class="pill pill-char">' + label + '</span>';
      }
      if (tok.type === 'place') return '<span class="pill pill-place">' + escHtml(tok.value) + '</span>';
      return '<span class="pill pill-text">' + escHtml(tok.value) + '</span>';
    }).join(' ');

    return '<div class="mark-row" onclick="jumpToMark(\'' + m.id + '\')" title="Jump to mark">'
         + '<div class="mark-row-pills">' + pillsHtml + '</div>'
         + '</div>';
  }).join('');
}

/* ================================================================
   CHARACTERS PANEL
   Ordered by first appearance in text.
   Each entry is expandable and shows all occurrence snippets.
   ================================================================ */
function buildCharsPanel() {
  var panel = document.getElementById('panel-chars');
  if (!charIndex.size) {
    panel.innerHTML = '<p class="no-marks">No @character marks found in this document.</p>';
    return;
  }

  // Order by first occurrence position in markList
  var markIdxMap = {};
  markList.forEach(function(m, i) { markIdxMap[m.id] = i; });

  var entries = Array.from(charIndex.entries()).sort(function(a, b) {
    var ai = markIdxMap[a[1].occurrences[0].markId];
    var bi = markIdxMap[b[1].occurrences[0].markId];
    return ai - bi;
  });

  var html = '<div class="panel-label">Characters · by first appearance</div>';

  entries.forEach(function(entry, ei) {
    var charId = entry[0];
    var data   = entry[1];  // { alias, occurrences: [{markId, ctx}] }
    var entryDomId = 'char-entry-' + ei;

    html += '<div class="char-entry" id="' + entryDomId + '">';

    // Header row — click to toggle
    html += '<div class="char-header" onclick="toggleChar(\'' + entryDomId + '\')">'
          + '<span class="char-toggle">&#9658;</span>'
          + '<span class="char-id">' + escHtml(charId) + '</span>';
    if (data.alias) {
      html += '<span class="char-alias">' + escHtml(data.alias) + '</span>';
    }
    html += '<span class="char-count">' + data.occurrences.length + '&times;</span>'
          + '</div>';

    // Occurrences list
    html += '<div class="char-occurrences">';
    data.occurrences.forEach(function(occ, oi) {
      // Trim context to ~60 chars
      var ctx = occ.ctx.length > 70 ? occ.ctx.substring(0, 68) + '…' : occ.ctx;
      html += '<div class="char-occ-row" onclick="jumpToMark(\'' + occ.markId + '\')" title="Jump to occurrence">'
            + '<span class="char-occ-num">#' + (oi + 1) + '</span>'
            + '<span class="char-occ-ctx">' + escHtml(ctx) + '</span>'
            + '</div>';
    });
    html += '</div></div>';  // .char-occurrences + .char-entry
  });

  panel.innerHTML = html;
}

function toggleChar(entryId) {
  var el = document.getElementById(entryId);
  if (el) el.classList.toggle('open');
}

/* ================================================================
   PLACES PANEL
   Trie built from /path/subpath strings.
   Children at every level are ordered by the first appearance of any
   mark inside that subtree (not alphabetically).
   Only directly-marked nodes are clickable (jump to first mention).
   ================================================================ */
function buildPlacesPanel() {
  var panel = document.getElementById('panel-places');
  if (!placeIndex.size) {
    panel.innerHTML = '<p class="no-marks">No /place marks found in this document.</p>';
    return;
  }

  // Map markId → position index for ordering
  var markIdxMap = {};
  markList.forEach(function(m, i) { markIdxMap[m.id] = i; });

  // Build trie
  // node: { _ids: [markId...], _firstIdx: number, children: { seg: node } }
  var root = { _ids: [], _firstIdx: Infinity, children: {} };

  placeIndex.forEach(function(ids, fullPath) {
    var parts = fullPath.replace(/^\//, '').split('/').filter(Boolean);
    var node = root;
    parts.forEach(function(seg, idx) {
      if (!node.children[seg]) {
        node.children[seg] = { _ids: [], _firstIdx: Infinity, children: {} };
      }
      node = node.children[seg];
      if (idx === parts.length - 1) {
        ids.forEach(function(id) {
          node._ids.push(id);
          var pos = markIdxMap[id];
          if (pos < node._firstIdx) node._firstIdx = pos;
        });
      }
    });
  });

  // Propagate _firstIdx upward: each parent inherits the minimum of its subtree
  function propagateFirst(node) {
    var minIdx = node._firstIdx;
    Object.values(node.children).forEach(function(child) {
      var childMin = propagateFirst(child);
      if (childMin < minIdx) minIdx = childMin;
    });
    node._firstIdx = minIdx;
    return minIdx;
  }
  propagateFirst(root);

  function renderNode(nodeMap, depth) {
    // Sort children by first appearance of any mark in their subtree
    return Object.entries(nodeMap)
      .sort(function(a, b) { return a[1]._firstIdx - b[1]._firstIdx; })
      .map(function(entry) {
        var seg  = entry[0];
        var node = entry[1];
        var hasChildren = Object.keys(node.children).length > 0;
        var firstId     = node._ids.length ? node._ids[0] : null;
        var count       = node._ids.length;
        var indent      = 14 + depth * 14;
        var chevron     = hasChildren ? '&#9662;' : '&#8250;';
        var cls         = firstId ? 'place-node' : 'place-node no-jump';
        var onclick     = firstId ? ' onclick="jumpToMark(\'' + firstId + '\')"' : '';
        var titleAttr   = firstId ? ' title="Jump to first mention (' + count + '&times;)"' : '';

        return '<div class="' + cls + '" style="padding-left:' + indent + 'px"' + onclick + titleAttr + '>'
             + '<span class="place-chevron">' + chevron + '</span>'
             + '<span class="place-id">/' + escHtml(seg) + '</span>'
             + (count ? '<span class="place-count">' + count + '&times;</span>' : '')
             + '</div>'
             + (hasChildren ? renderNode(node.children, depth + 1) : '');
      }).join('');
  }

  panel.innerHTML = '<div class="panel-label">Places · by first appearance</div>'
    + renderNode(root.children, 0);
}

/* ================================================================
   NAVIGATION HELPERS
   ================================================================ */
function jumpToMark(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

/* ================================================================
   UTILITY
   ================================================================ */
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
