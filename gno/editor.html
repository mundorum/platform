<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gnō- Narrative Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg:            #f5f2ec;
  --c-surface:       #fffef9;
  --c-border:        rgba(60,50,30,0.12);
  --c-border-strong: rgba(60,50,30,0.22);
  --c-text:          #1a1610;
  --c-muted:         #6b6050;
  --c-accent:        #7a3e1a;
  --c-accent-light:  #f0e8de;
  --c-tag-char:      #4a2a6a;
  --c-tag-char-bg:   #ede8f5;
  --c-tag-place:     #1a3a5a;
  --c-tag-place-bg:  #deeaf5;
  --c-tag-trans:     #1a3a30;
  --c-tag-trans-bg:  #daf5ee;
  --c-tag-text:      #3a4a1a;
  --c-tag-text-bg:   #e8eedd;
  --c-bq-border:     #c8a86a;
  --c-scene-node:    #fffef9;
  --c-scene-border:  rgba(60,50,30,0.30);
  --c-scene-header:  #f0e8de;
  --c-divert:        #7a3e1a;
  --font-ui:         'Outfit', sans-serif;
  --font-doc:        'Lora', serif;
  --font-mono:       'JetBrains Mono', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --c-bg:            #1a1810;
    --c-surface:       #211f17;
    --c-border:        rgba(200,180,140,0.12);
    --c-border-strong: rgba(200,180,140,0.22);
    --c-text:          #ede8dc;
    --c-muted:         #9a8e78;
    --c-accent:        #d08050;
    --c-accent-light:  #2a1e14;
    --c-tag-char:      #c0a0e0;
    --c-tag-char-bg:   #2a1e3a;
    --c-tag-place:     #88b8e0;
    --c-tag-place-bg:  #122030;
    --c-tag-trans:     #70d0b0;
    --c-tag-trans-bg:  #0e201a;
    --c-tag-text:      #a0c070;
    --c-tag-text-bg:   #182010;
    --c-bq-border:     #806040;
    --c-scene-node:    #211f17;
    --c-scene-border:  rgba(200,180,140,0.35);
    --c-scene-header:  #2a1e14;
    --c-divert:        #d08050;
  }
}

html, body { height: 100%; font-family: var(--font-ui); background: var(--c-bg); color: var(--c-text); overflow: hidden; }

/* ── Shell ── */
#app {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 52px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── Topbar ── */
#topbar {
  grid-column: 1 / -1;
  background: var(--c-surface);
  border-bottom: 0.5px solid var(--c-border-strong);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  flex-shrink: 0;
}
#topbar-logo {
  font-size: 15px;
  font-weight: 600;
  color: var(--c-accent);
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
  margin-right: 6px;
}
#topbar-logo i { font-size: 19px; }

.tb-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 13px;
  background: var(--c-accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-family: var(--font-ui);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.tb-btn:hover { opacity: 0.82; }
.tb-btn.ghost {
  background: none;
  color: var(--c-muted);
  border: 0.5px solid var(--c-border-strong);
}
.tb-btn.ghost:hover { color: var(--c-text); opacity: 1; }

#filename-display {
  font-size: 12.5px;
  color: var(--c-muted);
  font-family: var(--font-mono);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 220px;
}
.tb-sep { flex: 1; }

.view-tabs {
  display: flex;
  gap: 2px;
  background: var(--c-bg);
  border-radius: 7px;
  padding: 3px;
}
.view-tab {
  padding: 4px 12px;
  border: none;
  background: none;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  color: var(--c-muted);
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.view-tab.active { background: var(--c-surface); color: var(--c-accent); box-shadow: 0 0.5px 2px rgba(0,0,0,0.10); }
.view-tab:hover:not(.active) { color: var(--c-text); }

/* ── Left nav ── */
#nav-panel {
  background: var(--c-surface);
  border-right: 0.5px solid var(--c-border);
  overflow-y: auto;
  padding: 14px 0 20px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--c-muted);
  padding: 6px 16px 6px;
}
.scenario-group { margin-bottom: 2px; }
.scenario-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px 5px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--c-text);
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
  border-left: 2px solid transparent;
}
.scenario-header:hover { background: var(--c-accent-light); border-left-color: var(--c-border-strong); }
.scenario-header i { font-size: 13px; color: var(--c-muted); transition: transform 0.18s; }
.scenario-header.collapsed i.chevron { transform: rotate(-90deg); }
.scene-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  font-family: var(--font-ui);
  font-size: 12.5px;
  color: var(--c-muted);
  padding: 4px 14px 4px 30px;
  cursor: pointer;
  line-height: 1.4;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.scene-item:hover  { background: var(--c-accent-light); color: var(--c-accent); border-left-color: var(--c-accent); }
.scene-item.active { background: var(--c-accent-light); color: var(--c-accent); border-left-color: var(--c-accent); font-weight: 500; }

/* ── Main content area ── */
#main-area {
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--c-bg);
}

/* ── Split editor / preview ── */
#editor-view {
  display: flex;
  flex: 1;
  overflow: hidden;
}
#editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 0.5px solid var(--c-border);
  overflow: hidden;
}
#editor-pane textarea {
  flex: 1;
  width: 100%;
  resize: none;
  border: none;
  outline: none;
  padding: 32px 36px;
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.7;
  background: var(--c-bg);
  color: var(--c-text);
  tab-size: 2;
}
#editor-pane textarea::placeholder { color: var(--c-muted); opacity: 0.5; }
#preview-pane {
  flex: 1;
  overflow-y: auto;
  padding: 32px 44px;
}
#preview-content {
  max-width: 640px;
  margin: 0 auto;
  font-family: var(--font-doc);
  font-size: 16.5px;
  line-height: 1.82;
  color: var(--c-text);
}

/* preview typography */
#preview-content h1 { font-size: 1.75em; font-weight: 500; margin: 1.4em 0 0.4em; line-height: 1.2; }
#preview-content h2 { font-size: 1.35em; font-weight: 500; margin: 1.2em 0 0.4em; }
#preview-content h3 { font-size: 1.1em;  font-weight: 500; margin: 1em 0 0.35em; }
#preview-content h1:first-child, #preview-content h2:first-child { margin-top: 0; }
#preview-content p   { margin: 0.65em 0; }
#preview-content ul, #preview-content ol { margin: 0.5em 0 0.5em 1.5em; }
#preview-content li  { margin: 0.2em 0; }
#preview-content strong { font-weight: 500; }
#preview-content em    { font-style: italic; }
#preview-content blockquote {
  border-left: 3px solid var(--c-bq-border);
  background: #faf5ec;
  color: #5a4a2a;
  margin: 1em 0;
  padding: 10px 18px;
  border-radius: 0 6px 6px 0;
  font-style: italic;
}
#preview-content code {
  font-family: var(--font-mono);
  font-size: 0.82em;
  background: var(--c-accent-light);
  color: var(--c-accent);
  padding: 1px 5px;
  border-radius: 4px;
}
#preview-content pre {
  background: var(--c-accent-light);
  padding: 14px;
  border-radius: 7px;
  overflow-x: auto;
  margin: 0.8em 0;
}
#preview-content pre code { background: none; padding: 0; color: var(--c-text); }

/* scene heading decoration */
.scene-heading-block {
  background: var(--c-accent-light);
  border-left: 3px solid var(--c-accent);
  border-radius: 0 6px 6px 0;
  padding: 8px 16px;
  margin: 1.4em 0 0.6em;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.scene-heading-block .scene-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--c-accent);
  opacity: 0.7;
}
.scene-heading-block .scene-title {
  font-family: var(--font-doc);
  font-size: 1.15em;
  font-weight: 500;
  color: var(--c-text);
}
.scene-heading-block .scene-scenario {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-muted);
}

/* divert pill in preview */
.divert-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0.5em 0;
  font-family: var(--font-ui);
  font-size: 13px;
}
.divert-label {
  color: var(--c-text);
}
.divert-arrow {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--c-tag-trans-bg);
  color: var(--c-tag-trans);
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-weight: 500;
  padding: 2px 9px;
  border-radius: 4px;
  white-space: nowrap;
}

/* ── Graph view ── */
#graph-view {
  flex: 1;
  overflow: auto;
  position: relative;
  padding: 24px;
}
#graph-canvas {
  position: relative;
  min-width: 600px;
  min-height: 400px;
}
#graph-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}

.graph-node {
  position: absolute;
  width: 220px;
  background: var(--c-scene-node);
  border: 1px solid var(--c-scene-border);
  border-radius: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.15s, border-color 0.15s;
  user-select: none;
}
.graph-node:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.13); border-color: var(--c-accent); }
.graph-node.active-node { border-color: var(--c-accent); box-shadow: 0 0 0 2px var(--c-accent); }

.node-header {
  background: var(--c-scene-header);
  padding: 7px 11px 6px;
  border-bottom: 0.5px solid var(--c-scene-border);
}
.node-scenario {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--c-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.node-title {
  font-family: var(--font-ui);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--c-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.node-body {
  padding: 8px 11px;
  font-family: var(--font-doc);
  font-size: 11px;
  line-height: 1.55;
  color: var(--c-muted);
  max-height: 72px;
  overflow: hidden;
  position: relative;
}
.node-body::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 24px;
  background: linear-gradient(transparent, var(--c-scene-node));
}
.node-diverts {
  padding: 4px 11px 7px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.node-divert-chip {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--c-tag-trans-bg);
  color: var(--c-tag-trans);
  padding: 1px 7px;
  border-radius: 3px;
  display: inline-block;
  align-self: flex-start;
}

/* ── hidden file input ── */
#file-input { display: none; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-border-strong); border-radius: 3px; }
</style>
</head>
<body>
<div id="app" v-if="ready">

  <!-- Topbar -->
  <header id="topbar">
    <div id="topbar-logo">
      <i class="ti ti-feather"></i>
      gnō-
    </div>

    <button class="tb-btn" @click="triggerUpload"><i class="ti ti-upload"></i> Upload</button>
    <button class="tb-btn ghost" @click="downloadFile"><i class="ti ti-download"></i> Download</button>
    <input type="file" id="file-input" ref="fileInput" accept=".md,.gno,.txt" @change="onFileUpload">
    <span id="filename-display">{{ filename }}</span>

    <div class="tb-sep"></div>

    <div class="view-tabs">
      <button class="view-tab" :class="{active: view==='editor'}" @click="view='editor'">
        <i class="ti ti-edit"></i> Editor
      </button>
      <button class="view-tab" :class="{active: view==='graph'}" @click="view='graph'">
        <i class="ti ti-hierarchy-2"></i> Graph
      </button>
    </div>
  </header>

  <!-- Left nav -->
  <nav id="nav-panel" aria-label="Narrative structure">
    <div class="nav-section-label">Scenarios &amp; Scenes</div>
    <div v-if="scenarios.length === 0" style="padding: 10px 16px; font-size:12.5px; color:var(--c-muted); font-style:italic;">
      No scenes yet.<br>Write a heading like:<br><code style="font-size:11px">## Scene: Scenario</code>
    </div>
    <div v-for="sc in scenarios" :key="sc.name" class="scenario-group">
      <div
        class="scenario-header"
        :class="{collapsed: sc.collapsed}"
        @click="sc.collapsed = !sc.collapsed"
      >
        <i class="ti ti-chevron-down chevron"></i>
        <i class="ti ti-map"></i>
        {{ sc.name }}
      </div>
      <template v-if="!sc.collapsed">
        <button
          v-for="scene in sc.scenes"
          :key="scene.id"
          class="scene-item"
          :class="{active: activeSceneId === scene.id}"
          @click="scrollToScene(scene.id)"
        >
          {{ scene.title }}
        </button>
      </template>
    </div>
  </nav>

  <!-- Main -->
  <div id="main-area">

    <!-- Editor + Preview split -->
    <div id="editor-view" v-show="view === 'editor'">
      <div id="editor-pane">
        <textarea
          ref="editorTextarea"
          v-model="source"
          spellcheck="false"
          :placeholder="placeholder"
          @scroll="syncPreviewScroll"
        ></textarea>
      </div>
      <div id="preview-pane" ref="previewPane">
        <div id="preview-content" v-html="renderedHtml"></div>
      </div>
    </div>

    <!-- Graph view -->
    <div id="graph-view" v-show="view === 'graph'">
      <div id="graph-canvas" :style="graphCanvasStyle" ref="graphCanvas">
        <svg id="graph-svg" ref="graphSvg">
          <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" :fill="arrowColor" />
            </marker>
          </defs>
          <g v-for="edge in graphEdges" :key="edge.key">
            <path
              :d="edge.path"
              fill="none"
              :stroke="arrowColor"
              stroke-width="1.5"
              stroke-dasharray="5,3"
              marker-end="url(#arrow)"
              opacity="0.75"
            />
            <text
              :x="edge.labelX"
              :y="edge.labelY"
              font-family="'Outfit', sans-serif"
              font-size="10"
              :fill="labelColor"
              text-anchor="middle"
              dominant-baseline="middle"
            >{{ edge.label }}</text>
          </g>
        </svg>
        <div
          v-for="node in graphNodes"
          :key="node.id"
          class="graph-node"
          :class="{'active-node': activeSceneId === node.id}"
          :style="{left: node.x + 'px', top: node.y + 'px'}"
          @click="activeSceneId = node.id; view = 'editor'; $nextTick(() => scrollToScene(node.id))"
        >
          <div class="node-header">
            <div class="node-scenario">{{ node.scenario }}</div>
            <div class="node-title">{{ node.title }}</div>
          </div>
          <div class="node-body">{{ node.excerpt }}</div>
          <div class="node-diverts" v-if="node.diverts.length">
            <span v-for="d in node.diverts" :key="d.target" class="node-divert-chip">→ {{ d.target }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp, ref, computed, nextTick } = Vue;

/* ── GNO PARSER ── */
function parseGno(source) {
  // Returns: { scenes: [{id, title, scenario, body, diverts:[{label,target}], lineStart}] }
  const lines = source.split('\n');
  const scenes = [];
  let current = null;

  const SCENE_RE = /^#{1,6}\s+(.+?)\s*:\s*(.+)$/;
  const DIVERT_RE = /^\*\s+(.+?)\s*->\s*(.+)$/;

  lines.forEach((line, idx) => {
    const sm = line.match(SCENE_RE);
    if (sm) {
      if (current) scenes.push(current);
      const title = sm[1].trim();
      const scenario = sm[2].trim();
      const id = slugify(title + '-' + scenario + '-' + idx);
      current = { id, title, scenario, body: [], diverts: [], lineStart: idx };
      return;
    }
    if (current) {
      const dm = line.match(DIVERT_RE);
      if (dm) {
        current.diverts.push({ label: dm[1].trim(), target: dm[2].trim() });
      }
      current.body.push(line);
    }
  });
  if (current) scenes.push(current);
  return scenes;
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

/* ── MARKDOWN RENDERER ── */
function renderGno(source, scenes) {
  // Build a map of title -> scene id for preview anchors
  const titleToId = {};
  scenes.forEach(s => {
    titleToId[s.title.toLowerCase()] = s.id;
  });

  // Pre-process: replace scene headings and divert lines
  const lines = source.split('\n');
  const out = [];

  const SCENE_RE = /^(#{1,6})\s+(.+?)\s*:\s*(.+)$/;
  const DIVERT_RE = /^\*\s+(.+?)\s*->\s*(.+)$/;
  let sceneIdx = 0;

  lines.forEach(line => {
    const sm = line.match(SCENE_RE);
    if (sm) {
      const title = sm[2].trim();
      const scenario = sm[3].trim();
      const id = scenes[sceneIdx] ? scenes[sceneIdx].id : slugify(title + scenario);
      sceneIdx++;
      out.push('');
      out.push(`<div class="scene-heading-block" id="${escH(id)}">`);
      out.push(`<span class="scene-label">Scene</span>`);
      out.push(`<span class="scene-title">${escH(title)}</span>`);
      out.push(`<span class="scene-scenario">Scenario: ${escH(scenario)}</span>`);
      out.push(`</div>`);
      out.push('');
      return;
    }
    const dm = line.match(DIVERT_RE);
    if (dm) {
      const label = dm[1].trim();
      const target = dm[2].trim();
      const targetId = titleToId[target.toLowerCase()];
      const href = targetId ? `#${targetId}` : '#';
      out.push('');
      out.push(`<div class="divert-line">`);
      out.push(`<span class="divert-label">${escH(label)}</span>`);
      out.push(`<a class="divert-arrow" href="${href}">→ ${escH(target)}</a>`);
      out.push(`</div>`);
      out.push('');
      return;
    }
    out.push(line);
  });

  return marked.parse(out.join('\n'), { gfm: true, breaks: false });
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── GRAPH LAYOUT (left-to-right daggers) ── */
const NODE_W = 220;
const NODE_H = 140; // approx — actual height may vary
const H_GAP  = 80;
const V_GAP  = 36;

function layoutGraph(scenes) {
  if (!scenes.length) return { nodes: [], edges: [] };

  // Build adjacency: title -> scene
  const byTitle = {};
  scenes.forEach(s => { byTitle[s.title.toLowerCase()] = s; });

  // Topological columns via BFS from root (first scene)
  const col = {};  // id -> column index
  const row = {};  // id -> row within column
  const colCount = {};

  const visited = new Set();
  const queue = [];
  const roots = new Set(scenes.map(s => s.id));

  // remove all scenes that are targets (find true roots)
  scenes.forEach(s => {
    s.diverts.forEach(d => {
      const ts = byTitle[d.target.toLowerCase()];
      if (ts) roots.delete(ts.id);
    });
  });

  const startIds = roots.size ? [...roots] : [scenes[0].id];

  startIds.forEach(id => {
    col[id] = 0;
    queue.push(id);
  });

  while (queue.length) {
    const id = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    const scene = scenes.find(s => s.id === id);
    if (!scene) continue;
    const c = col[id] ?? 0;
    if (!(c in colCount)) colCount[c] = 0;
    row[id] = colCount[c]++;
    scene.diverts.forEach(d => {
      const ts = byTitle[d.target.toLowerCase()];
      if (ts && !visited.has(ts.id)) {
        col[ts.id] = Math.max(col[ts.id] ?? 0, c + 1);
        queue.push(ts.id);
      }
    });
  }

  // Scenes not reached (orphans)
  scenes.forEach(s => {
    if (!(s.id in col)) {
      const c = Object.keys(colCount).length;
      col[s.id] = c;
      if (!(c in colCount)) colCount[c] = 0;
      row[s.id] = colCount[c]++;
    }
  });

  // Compute positions
  const nodes = scenes.map(s => {
    const c = col[s.id] ?? 0;
    const r = row[s.id] ?? 0;
    const x = c * (NODE_W + H_GAP) + 24;
    const y = r * (NODE_H + V_GAP) + 24;
    const excerpt = s.body
      .filter(l => l.trim() && !l.match(/^\*\s+.+->/) )
      .join(' ')
      .replace(/[#*`>]/g, '')
      .trim()
      .slice(0, 140);
    return { id: s.id, title: s.title, scenario: s.scenario, x, y, excerpt, diverts: s.diverts };
  });

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  // Edges
  const edges = [];
  scenes.forEach(s => {
    const src = nodeMap[s.id];
    if (!src) return;
    s.diverts.forEach(d => {
      const ts = byTitle[d.target.toLowerCase()];
      if (!ts) return;
      const tgt = nodeMap[ts.id];
      if (!tgt) return;
      const key = `${s.id}__${ts.id}__${d.label}`;
      // cubic bezier from right-center of src to left-center of tgt
      const x1 = src.x + NODE_W;
      const y1 = src.y + 56;
      const x2 = tgt.x;
      const y2 = tgt.y + 56;
      const cx1 = x1 + (x2 - x1) * 0.5;
      const cy1 = y1;
      const cx2 = x1 + (x2 - x1) * 0.5;
      const cy2 = y2;
      const path = `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
      const labelX = (x1 + x2) / 2;
      const labelY = (y1 + y2) / 2 - 9;
      edges.push({ key, path, label: d.label, labelX, labelY });
    });
  });

  return { nodes, edges };
}

/* ── VUE APP ── */
createApp({
  setup() {
    const ready = ref(true);
    const source = ref(`# The Awakening: Forest
The old manor looms at the edge of the clearing. Mist clings to the stones.

* Enter the manor -> The Dark Hall
* Follow the trail -> The Crossroads

# The Dark Hall: Manor
Flickering candlelight reveals dusty portraits and a locked iron door.

* Try the iron door -> The Vault
* Go back outside -> The Awakening

# The Crossroads: Forest
Three paths diverge here. An old signpost reads faded names.

* Take the northern road -> The Village
* Return to the manor -> The Awakening

# The Vault: Manor
Behind the iron door: stacked ledgers, a brass key, and an old photograph.

* Take the key -> The Dark Hall

# The Village: Settlement
Smoke from chimneys. Children playing. A merchant waves from a stall.

* Ask about the manor -> The Crossroads
`);
    const filename = ref('untitled.gno');
    const view = ref('editor');
    const activeSceneId = ref('');
    const fileInput = ref(null);
    const editorTextarea = ref(null);
    const previewPane = ref(null);

    const scenes = computed(() => parseGno(source.value));

    const scenarios = computed(() => {
      const map = new Map();
      scenes.value.forEach(s => {
        if (!map.has(s.scenario)) map.set(s.scenario, { name: s.scenario, collapsed: false, scenes: [] });
        map.get(s.scenario).scenes.push(s);
      });
      return [...map.values()];
    });

    const renderedHtml = computed(() => renderGno(source.value, scenes.value));

    const graphLayout = computed(() => layoutGraph(scenes.value));
    const graphNodes  = computed(() => graphLayout.value.nodes);
    const graphEdges  = computed(() => graphLayout.value.edges);

    const graphCanvasStyle = computed(() => {
      if (!graphNodes.value.length) return {};
      const maxX = Math.max(...graphNodes.value.map(n => n.x + NODE_W)) + 40;
      const maxY = Math.max(...graphNodes.value.map(n => n.y + NODE_H)) + 40;
      return { width: maxX + 'px', height: maxY + 'px' };
    });

    const arrowColor  = ref('var(--c-divert)');
    const labelColor  = ref('var(--c-muted)');

    const placeholder = `# Scene Title: Scenario Name
Write your scene description here.

* Choice label -> Target Scene Title
`;

    function scrollToScene(id) {
      activeSceneId.value = id;
      nextTick(() => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }

    function syncPreviewScroll(e) {
      if (!previewPane.value) return;
      const ta = e.target;
      const ratio = ta.scrollTop / (ta.scrollHeight - ta.clientHeight);
      const pp = previewPane.value;
      pp.scrollTop = ratio * (pp.scrollHeight - pp.clientHeight);
    }

    function triggerUpload() {
      fileInput.value.click();
    }

    function onFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      filename.value = file.name;
      const reader = new FileReader();
      reader.onload = ev => { source.value = ev.target.result; };
      reader.readAsText(file, 'UTF-8');
      e.target.value = '';
    }

    function downloadFile() {
      const blob = new Blob([source.value], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename.value.match(/\.(md|gno|txt)$/) ? filename.value : filename.value + '.gno';
      a.click();
      URL.revokeObjectURL(url);
    }

    return {
      ready, source, filename, view, activeSceneId,
      fileInput, editorTextarea, previewPane,
      scenes, scenarios, renderedHtml,
      graphNodes, graphEdges, graphCanvasStyle,
      arrowColor, labelColor, placeholder,
      scrollToScene, syncPreviewScroll,
      triggerUpload, onFileUpload, downloadFile,
    };
  }
}).mount('#app');
</script>
</body>
</html>
